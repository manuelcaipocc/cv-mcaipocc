# Configuration of Hugo
# Guide: https://docs.hugoblox.com/tutorial/
# Hugo Documentation: https://gohugo.io/getting-started/configuration/#all-configuration-settings
# This file is formatted using YAML syntax - learn more at https://learnxinyminutes.com/docs/yaml/

# Website name
title: Manuel Caipo | Machine Learning Researcher & Mechanical Engineer
# Website URL
baseURL: 'https://manuelcaipocc.github.io/testcv/'

description: "Research portfolio of Manuel Caipo. Focused on Physics-aware Machine Learning, topology-aware models, and interpretable AI for complex cyber-physical systems and industrial reliability."

params:
  contact_links:
    - icon: linkedin
      icon_pack: fab
      link: 'https://www.linkedin.com/in/manuel-caipo-89845b151/'
    - icon: github
      icon_pack: fab
      link: 'https://github.com/manuelcaipocc'
  
  marketing:
    seo:
      schema:
        enabled: true
        person_type: 'Person'


############################
## LANGUAGE
############################

defaultContentLanguage: en
hasCJKLanguage: false
defaultContentLanguageInSubdir: false
removePathAccents: true

############################
## ADVANCED
############################

build:
  writeStats: true
enableGitInfo: false
summaryLength: 30
pagination:
  pagerSize: 10
enableEmoji: true
enableRobotsTXT: true
footnotereturnlinkcontents: <sup>^</sup>
ignoreFiles: [\.ipynb$, .ipynb_checkpoints$, \.Rmd$, \.Rmarkdown$, _cache$]
permalinks:
  authors: '/author/:slug/'
disableAliases: true
outputs:
  home: [HTML, RSS, headers, redirects, backlinks]
  section: [HTML, RSS]
imaging:
  resampleFilter: lanczos
  quality: 80
  anchor: smart
timeout: 600000
taxonomies:
  author: authors
  tag: tags
  publication_type: publication_types
markup:
  _merge: deep
  highlight:
    lineNos: false
security:
  _merge: deep
sitemap:
  _merge: deep
